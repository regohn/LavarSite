      /**
       * Helper: Extracts ID from Drive URL and returns a thumbnail link
       */
      function getDriveThumbnail(url) {
        if (!url) return "";
        const match = url.match(/[-\w]{25,}/);
        return match ? `https://drive.google.com/thumbnail?id=${match[0]}` : "";
      }

      /**
       * Update the visual queue UI at the top
       */
      function updateQueueUI() {
        const queueStatus = document.getElementById("queueStatus");
        const queueCount = document.getElementById("queueCount");
        const nextUploadInfo = document.getElementById("nextUploadInfo");

        if (uploadQueue.length > 0) {
          queueStatus.style.display = "block";
          queueCount.innerText = uploadQueue.length;
          
          const current = uploadQueue[0];
          nextUploadInfo.innerHTML = `Next: <span class="queue-item-info">${current.JOR}</span> - <span class="queue-item-info">${current.CustomerName}</span>`;
        } else {
          queueStatus.style.display = "none";
        }
      }

      /**
       * Search functionality: Fetches details from Google Sheet master list
       */
      searchButton.addEventListener("click", async function () {
        const joNumber = JOsearchField.value.trim();
        
        document.getElementById("DeliveryStaff").value = "";
        document.getElementById("Comments").value = "";
        JOresult.innerHTML = ""; 

        if (!joNumber) {
          JOresult.innerHTML = "<span class='text-warning'>Please enter a JO number.</span>";
          return;
        }

        JOresult.innerHTML = "Searching...";

        try {
          const response = await fetch(`${scriptURL}?JO=${joNumber}`);
          const data = await response.json();

          if (data.result === "not found") {
            JOresult.innerHTML = "<span class='text-danger'>Di Pa Na Log ng Mga Nagtupi. Tawagan sila at ipalog.</span>";
            return;
          }

          let picturesHTML = "";
          ["Picture1", "Picture2", "Picture3"].forEach((pic, i) => {
            if (data[pic]) {
              picturesHTML += `
                <div class="mt-2">
                  <table border="0">
                    <tr>
                      <td>${pic}:</td>
                      <td>
                        <a href="${data[pic]}" target="_blank">

                        </a>
                      </td>
                    </tr>
                  </table>
                </div>`;
            }
          });

          const formattedDeliveryDatetime = formatDateTime(data.DeliveryTimeStamp);

          JOresult.innerHTML = `
            <div style="font-size: 11px; border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: #f9f9f9;">
              <br><strong>Customer Name:</strong> ${data.value} <br>
              <strong>JO#:</strong> ${data.JO} <br>

              <strong>Total Amount:</strong> ${data.colK} <br>
              <strong>Folder:</strong> ${data.colD} <br>
              <strong>Details:</strong> ${data.colE} <br><br>
              <strong>Delivered By:</strong> ${data.DeliveryStaff || ''} <br>
              <strong>Comments:</strong> ${data.Comments || ''} <br>
              <strong>Date of Delivery:</strong> ${formattedDeliveryDatetime} <br>

            </div>`;

            document.getElementById("Comments").value = data.Comments;

      /**
       * Date formatting helper
       */
      function formatDateTime(isoString) {
        if (!isoString) return "N/A";
        const date = new Date(isoString);
        if (isNaN(date.getTime())) return isoString;
        return date.toLocaleString("en-US", {
          month: "2-digit", day: "2-digit", year: "numeric",
          hour: "2-digit", minute: "2-digit", hour12: true
        });
      }

      /**
       * Date navigation chevrons
       */
      function changeDate(offsetDays) {
        const currentDateEl = document.getElementById("currentDate");
        const currentDate = new Date(currentDateEl.innerText);
        currentDate.setDate(currentDate.getDate() + offsetDays);
        const formatted = currentDate.toISOString().split("T")[0];
        currentDateEl.innerText = formatted;
        loadJODropdown(formatted);
      }

      /**
       * Fetches scheduled requests for a specific date
       */
      async function loadJODropdown(passedDate) {
        const dropdown = document.getElementById("joDropdown");
        dropdown.innerHTML = '<option value="">Searching for requests...</option>';
        try {
          const url = `${requestScriptURL}?date=${encodeURIComponent(passedDate)}`;
          const response = await fetch(url);
          const data = await response.json();
          
          dropdown.innerHTML = '<option value="">Select Requested JO# for Delivery</option>';
          if (!Array.isArray(data) || data.length === 0) {
            const opt = document.createElement("option");
            opt.textContent = "No JOs found for this date";
            opt.value = "";
            dropdown.appendChild(opt);
            return;
          }
          data.forEach(item => {
            if (item["Del JO#"]) {
              const option = document.createElement("option");
              option.value = item["Del JO#"];
              option.textContent = `${item["Del JO#"]} || ${item.name}`;
              dropdown.appendChild(option);
            }
          });
        } catch (err) {
          console.error("Dropdown Load Error:", err);
          dropdown.innerHTML = '<option value="">Error loading JOs</option>';
        }
      }

      /**

       */
/**

       */
/**

/**

function togglePaymentRefInputs() {
        const gcashRadio = document.getElementById("G-Cash");
        const gcashInfo = document.getElementById("gcashInfo");
        const gcashLookupMsg = document.getElementById("gcashLookupMsg");

        // Target file components

          if (originalMediaRow && originalMediaInput) {

            originalMediaInput.disabled = true;

          }
          if (originalMediaRow && originalMediaInput) {
            originalMediaRow.style.display = "block";
            originalMediaInput.disabled = false;
          }
        }
      }

      function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

// --- GEMINI 2.5 OCR AUTOMATION FOR DUAL ONLINE SCANNING & CLASSIFICATION ---
      document.getElementById("gcashMedia").addEventListener("change", async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const gcashLookupMsg = document.getElementById("gcashLookupMsg");
        const gcashInfoField = document.getElementById("gcashInfo");
        const submitBtn = document.getElementById("mainsubmitbutton");

        gcashLookupMsg.style.color = "#007bff";
        gcashLookupMsg.innerText = "⏳ Gemini AI is identifying and parsing receipt layout...";
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.style.opacity = "0.5";
          submitBtn.innerText = "AI Processing...";
        }

        try {
          const base64Data = await readFileAsBase64(file);
          const mimeType = file.type || "image/jpeg";

          // Routed through the secure Apps Script backend — key stays server-side in Script Properties
          const payload = new URLSearchParams();
          payload.append("action", "analyzeGcash");
          payload.append("base64Data", base64Data);
          payload.append("mimeType", mimeType);

          const response = await fetch(scriptURL, {
            method: "POST",
            body: payload,
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
          });

          if (!response.ok) throw new Error("Backend connection error encountered.");

          const parsedReceipt = await response.json();

          if (parsedReceipt.error) {
            throw new Error(parsedReceipt.error);
          }

          if (parsedReceipt && parsedReceipt.shortRefNo) {
            gcashInfoField.value = parsedReceipt.shortRefNo;
            
            // DYNAMIC CLASSIFICATION: Remaps the radio element value before submission reads it
            const classifiedType = parsedReceipt.paymentType || "G-Cash";
            document.getElementById("G-Cash").value = classifiedType;

            // Save the AI-read amount and transaction date so they get submitted with the form
            document.getElementById("GcashTransAmount").value = parsedReceipt.amount || "";
            document.getElementById("TransactionDate").value = parsedReceipt.transactionDate || "";
            
            gcashLookupMsg.style.color = "#28a745";
            gcashLookupMsg.innerText = `✅ AI Match (${classifiedType}): Ref ${parsedReceipt.shortRefNo} | Amt: ₱${parsedReceipt.amount} | ${parsedReceipt.transactionDate || "no date read"}`;
            
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.style.opacity = "1";
              submitBtn.innerText = "Submit";
            }

            // Fire input duplicate checker instantly
            gcashInfoField.dispatchEvent(new Event("input"));
            
          } else {
            throw new Error("Failed to capture short transaction code pattern from the target photo.");
          }

        } catch (err) {
          console.error("Gemini Extraction Failure Chain:", err);
          
          gcashLookupMsg.style.color = "#d9534f";
          gcashLookupMsg.innerText = "❌ AI could not read the screenshot cleanly. Please re-upload or ensure the transaction image is clear.";
          gcashInfoField.value = "";
          document.getElementById("G-Cash").value = "G-Cash";
          document.getElementById("GcashTransAmount").value = "";
          document.getElementById("TransactionDate").value = "";
          
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
            submitBtn.innerText = "Submit";
          }
        }
      });

       */
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const JOR = document.getElementById("JOR").value;
        if (!JOR || JOR.trim() === "") {
          swal("Missing JO#", "Please search and select a Job Order first.", "warning");
          return;
        }

        const paymentType = document.querySelector('input[name="PaymentType"]:checked')?.value;
        const paymentRefValidators = {
          "G-Cash": {
            field: document.getElementById("gcashInfo"),
            pattern: /^\d{6}$/,
            msg: "G-Cash Reference # must be exactly 6 digits."
          },
          "Other Online Banking": {
            field: document.getElementById("gcashInfo"),
            pattern: /^[A-Za-z0-9]{4,20}$/,
            msg: "Reference # must be 4–20 letters/numbers."
          }
        };
        const validator = paymentRefValidators[paymentType];
        if (validator && validator.field.style.display !== "none") {
          if (!validator.pattern.test(validator.field.value.trim())) {
            swal("Invalid Reference #", validator.msg, "warning");
            return;
          }
        }

        const submitBtn = document.getElementById("mainsubmitbutton");
        submitBtn.disabled = true;
        submitBtn.innerText = "Queueing...";

        const formData = new FormData(form);
        const data = {};

        const filePromises = [];
        formData.forEach((value, key) => {
          if (value instanceof File && value.size > 0) {
            const promise = readFileAsBase64(value).then(b64 => ({ key, value: b64 }));
            filePromises.push(promise);
          } else if (!(value instanceof File)) {
            data[key] = value;
          }
        });

        try {
          const resolvedFiles = await Promise.all(filePromises);
          resolvedFiles.forEach(f => data[f.key] = f.value);

          const dropdownValue = joDropdown.value;
          if (dropdownValue === JOR) {
            const optionToRemove = joDropdown.querySelector(`option[value="${JOR}"]`);
            if (optionToRemove) {
              optionToRemove.remove();
            }
          }

          uploadQueue.push(data);
          updateQueueUI();
          
          swal("Success", "Delivery details have been queued.", "success");
          clearForm();
        } catch (err) {
          console.error("Queue Error:", err);
          swal("Error", "There was an error processing your photos.", "error");
          submitBtn.disabled = false;
          submitBtn.innerText = "Submit";
        }
      });

      /**
       * Background process: Sends queued data to Google Apps Script
       */
      async function processQueue() {
        if (isUploading || uploadQueue.length === 0 || !navigator.onLine) return;
        
        isUploading = true;
        updateQueueUI();
        const currentData = uploadQueue[0];

        try {
          const params = new URLSearchParams();
          for (const key in currentData) params.append(key, currentData[key]);

          await fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            body: params.toString(),
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
          });

          uploadQueue.shift();
          console.log("Queue Update: Upload successful. " + uploadQueue.length + " items remaining.");
        } catch (err) {
          console.error("Background Queue Error:", err);
        } finally {
          isUploading = false;
          updateQueueUI();
        }
      }


      // --- APP ENTRY POINT ---
      window.onload = function() {
        const manilaDate = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Manila' });
        const dateSpan = document.getElementById("currentDate");
        if (dateSpan) {
          dateSpan.innerText = manilaDate;
          loadJODropdown(manilaDate);
        }
        
        setInterval(processQueue, 5000); 
      }

      // Main upper form payment ref duplicate checker (G-Cash & Other Online Payment)
      // Uses a live lookup against the Apps Script backend so results are always current,
      // instead of the old IndexedDB cache which could miss newly added entries.
      const paymentRefLookupTimers = {};

      function setupPaymentRefValidation(inputId, msgElementId, mode) {
        // mode: 'numeric' (G-Cash, exactly 6 digits) or 'alphanumeric' (Other Online, 4-20 chars)
        const pattern = mode === 'alphanumeric' ? /^[A-Za-z0-9]{4,20}$/ : /^\d{6}$/;

        document.getElementById(inputId).addEventListener('input', function() {
          const userInput = this.value.trim();
          const msgElement = document.getElementById(msgElementId);
          const submitBtn = document.getElementById("mainsubmitbutton");

          clearTimeout(paymentRefLookupTimers[inputId]);
          msgElement.innerText = "";

          if (userInput.length === 0) {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.style.opacity = "1";
              submitBtn.style.cursor = "pointer";
            }
            return;
          }

          // Only fire lookup once the pattern is fully matched
          if (!pattern.test(userInput)) return;

          paymentRefLookupTimers[inputId] = setTimeout(async () => {
            msgElement.style.color = "#007bff";
            msgElement.innerText = "Checking reference number...";

            try {
              const response = await fetch(`${gcashLookupScriptURL}?action=lookupGcashDetails&gcashRef=${encodeURIComponent(userInput)}`);
              const resultData = await response.json();

              if (resultData.result === "success") {
                // Found in Delivery sheet Column N — already used
                const match = resultData.data[0];
                msgElement.style.color = "#d9534f";
                msgElement.innerHTML = `<strong>⚠️ Already used:</strong> JO# ${match.jor} | ${match.customerName} | Kung pang 2 JO ito, imamanual edit ito sa audit with Sir Will.`;

                if (submitBtn) {
                  submitBtn.disabled = true;
                  submitBtn.style.opacity = "0.5";
                  submitBtn.style.cursor = "not-allowed";
                }
              } else if (resultData.result === "not_found") {
                // Not in Delivery sheet — safe to use
                msgElement.style.color = "#28a745";
                msgElement.innerText = "✅ Reference number is available";

                if (submitBtn) {
                  submitBtn.disabled = false;
                  submitBtn.style.opacity = "1";
                  submitBtn.style.cursor = "pointer";
                }


              } else {
                msgElement.style.color = "#d9534f";
                msgElement.innerText = "⚠️ Could not verify. Proceed with caution.";
                if (submitBtn) {
                  submitBtn.disabled = false;
                  submitBtn.style.opacity = "1";
                  submitBtn.style.cursor = "pointer";
                }
              }
            } catch (err) {
              console.error("Ref lookup error:", err);
              msgElement.style.color = "#d9534f";
              msgElement.innerText = "📡 Could not connect to server. Proceed with caution.";
              if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.style.cursor = "pointer";
              }
            }
          }, 1000);
        });
      }

      setupPaymentRefValidation('gcashInfo', 'gcashLookupMsg', 'alphanumeric');

      /**
       * NEW ASSIGNMENTS: Triggers the AJAX query to the Apps Script backend to verify payment data
       */
      async function triggerGcashVerification() {
        const gcashRef = lookupGcashField.value.trim();

        lookupStatusMsg.innerText = "";
        lookupTableBody.innerHTML = "";
        lookupTableWrapper.style.display = "none";

        if (gcashRef.length === 0) return;

        if (!/^\d{6}$/.test(gcashRef)) {
          lookupStatusMsg.style.color = "#d9534f";
          lookupStatusMsg.innerText = "⚠️ Reference # must be exactly 6 digits.";
          return;
        }

        lookupStatusMsg.style.color = "#007bff";
        lookupStatusMsg.innerText = "Searching Delivery database...";

        try {
          const response = await fetch(`${gcashLookupScriptURL}?action=lookupGcashDetails&gcashRef=${encodeURIComponent(gcashRef)}`);
          const resultData = await response.json();

          if (resultData.result === "success") {
            lookupStatusMsg.style.color = "#28a745";
            lookupStatusMsg.innerText = `✅ Found ${resultData.data.length} match(es). Verify details below before linking:`;
            
            resultData.data.forEach(item => {
              const row = document.createElement('tr');
              row.innerHTML = `
                <td><strong>${item.jor}</strong></td>
                <td>${item.timestamp}</td>
                <td>${item.customerName}</td>
                <td><span class="badge badge-info">${item.paymentType}</span></td>
              `;
              lookupTableBody.appendChild(row);
            });
            
            lookupTableWrapper.style.display = "block";
          } else if (resultData.result === "not_found") {
            lookupStatusMsg.style.color = "#a94442";
            lookupStatusMsg.innerText = "❌ This GCash reference hasn't been logged in any delivery sheet yet.";
          } else {
            lookupStatusMsg.style.color = "#d9534f";
            lookupStatusMsg.innerText = "⚠️ Error reading database metadata.";
          }
        } catch (err) {
          console.error("Lookup pipeline error:", err);
          lookupStatusMsg.style.color = "#d9534f";
          lookupStatusMsg.innerText = "📡 Server communication failure.";
        }
      }
      // Listen for bottom lookup form interactions (Stable 1-second delay after typing stops)
      lookupGcashField.addEventListener('input', function() {
        clearTimeout(associationLookupTimer);
        associationLookupTimer = setTimeout(triggerGcashVerification, 1000);
      });

      // (submit handler is defined above in the JO slots section)


// New real-time JO lookup elements - now 10 slots, generated dynamically
      const JO_SLOT_COUNT = 10;
      const joNumSlotsContainer = document.getElementById('joNumSlots');
      const joLookupTimers = {};

      // Build 10 JO# input slots
      for (let s = 1; s <= JO_SLOT_COUNT; s++) {
        joNumSlotsContainer.insertAdjacentHTML('beforeend', `
          <div class="form-group" id="joSlot${s}">
            <label for="lookupJoNum${s}" style="font-size:13px; margin-bottom:2px;">
              JO# ${s} ${s === 1 ? '<span class="text-danger">*</span>' : '<span class="text-muted" style="font-size:11px;">(optional)</span>'}
            </label>
            <input 
              type="text" 
              class="form-control jo-num-input" 
              id="lookupJoNum${s}" 
              name="lookupJoNum${s}" 
              placeholder="Enter Job Order Number"
              ${s === 1 ? 'required' : ''}
              data-slot="${s}"
              autocomplete="off"
            />
            <small id="joLookupStatusMsg${s}" class="form-text mt-1 font-weight-bold"></small>
            <div id="joLookupTableWrapper${s}" class="table-responsive mt-1 mb-1" style="display:none;">
              <p class="text-muted mb-1" style="font-size:11px;"><strong>Existing delivery log for this JO#:</strong></p>
              <table class="table table-sm table-bordered bg-white" style="font-size:11px; text-align:center;">
                <thead class="thead-light">
                  <tr><th>GCash Ref#</th><th>Timestamp</th><th>CustomerName</th><th>PaymentType</th></tr>
                </thead>
                <tbody id="joLookupTableBody${s}"></tbody>
              </table>
            </div>
          </div>`);
      }

      // Legacy alias for slot 1 (keeps any old references working)
      const lookupJoField      = document.getElementById('lookupJoNum1');
      const joLookupStatusMsg  = document.getElementById('joLookupStatusMsg1');
      const joLookupTableWrapper = document.getElementById('joLookupTableWrapper1');
      const joLookupTableBody  = document.getElementById('joLookupTableBody1');

      /**
       * Verify a single JO# slot against the backend
       */
      async function triggerJoVerificationForSlot(slotIndex) {
        const field      = document.getElementById(`lookupJoNum${slotIndex}`);
        const statusMsg  = document.getElementById(`joLookupStatusMsg${slotIndex}`);
        const tableWrap  = document.getElementById(`joLookupTableWrapper${slotIndex}`);
        const tableBody  = document.getElementById(`joLookupTableBody${slotIndex}`);
        const joNum      = field.value.trim();

        statusMsg.innerText = "";
        tableBody.innerHTML = "";
        tableWrap.style.display = "none";

        if (joNum.length === 0) return;

        statusMsg.style.color = "#007bff";
        statusMsg.innerText = "Searching Delivery database for JO#...";

        try {
          const response   = await fetch(`${gcashLookupScriptURL}?action=lookupJoDetails&joNum=${encodeURIComponent(joNum)}`);
          const resultData = await response.json();

          if (resultData.result === "success") {
            statusMsg.style.color = "#28a745";
            statusMsg.innerText = `✅ Found record. Verify existing payment logs below:`;
            resultData.data.forEach(item => {
              const row = document.createElement('tr');
              row.innerHTML = `
                <td><strong>${item.gcashRef || 'None'}</strong></td>
                <td>${item.timestamp}</td>
                <td>${item.customerName}</td>
                <td><span class="badge badge-info">${item.paymentType}</span></td>`;
              tableBody.appendChild(row);
            });
            tableWrap.style.display = "block";
          } else if (resultData.result === "not_found") {
            statusMsg.style.color = "#6c757d";
            statusMsg.innerText = "ℹ️ No active logs in the delivery tab yet.";
          } else {
            statusMsg.style.color = "#d9534f";
            statusMsg.innerText = "⚠️ " + resultData.message;
          }
        } catch (err) {
          statusMsg.style.color = "#d9534f";
          statusMsg.innerText = "📡 Server communication failure.";
        }
      }

      // Attach input listeners to all 10 JO slots
      for (let s = 1; s <= JO_SLOT_COUNT; s++) {
        document.getElementById(`lookupJoNum${s}`).addEventListener('input', function() {
          clearTimeout(joLookupTimers[s]);
          joLookupTimers[s] = setTimeout(() => triggerJoVerificationForSlot(s), 1000);
        });
      }

      // Legacy single-slot trigger alias
      async function triggerJoVerification() { triggerJoVerificationForSlot(1); }

/**
       * Submit: loop through all 10 JO slots, associate each non-empty JO# with the single GCash ref
       */
      document.getElementById("gcash-association-form").addEventListener("submit", async function(e) {
        e.preventDefault();

        const gcashRef  = document.getElementById("lookupGcashRef").value.trim();
        const submitBtn = document.getElementById("lookupSubmitButton");

        if (!/^\d{6}$/.test(gcashRef)) {
          swal("Invalid GCash Ref#", "Reference # must be exactly 6 digits.", "warning");
          return;
        }

        // Collect all non-empty JO# values
        const josToProcess = [];
        for (let s = 1; s <= JO_SLOT_COUNT; s++) {
          const val = document.getElementById(`lookupJoNum${s}`).value.trim();
          if (val === "") continue;
          josToProcess.push({ slotIndex: s, joNum: val });
        }

        if (josToProcess.length === 0) {
          swal("No JO Numbers", "Please enter at least one Job Order Number.", "warning");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = `Processing 0 / ${josToProcess.length}...`;

        const results = { success: [], failed: [] };

        for (let idx = 0; idx < josToProcess.length; idx++) {
          const { slotIndex, joNum } = josToProcess[idx];
          submitBtn.innerText = `Processing ${idx + 1} / ${josToProcess.length}...`;

          try {
            const targetUrl  = `${gcashLookupScriptURL}?action=associateGcash&lookupGcashRef=${encodeURIComponent(gcashRef)}&lookupJoNum=${encodeURIComponent(joNum)}`;
            const response   = await fetch(targetUrl, { method: "GET" });
            const resultData = await response.json();

            const statusEl = document.getElementById(`joLookupStatusMsg${slotIndex}`);
            if (resultData.result === "success") {
              results.success.push(`Slot ${slotIndex}: JO# ${joNum}`);
              statusEl.style.color = "#28a745";
              statusEl.innerText = `✅ Linked to GCash Ref# ${gcashRef}`;
            } else {
              results.failed.push(`Slot ${slotIndex}: JO# ${joNum} — ${resultData.message}`);
              statusEl.style.color = "#d9534f";
              statusEl.innerText = `❌ Failed: ${resultData.message}`;
            }
          } catch (err) {
            results.failed.push(`Slot ${slotIndex}: JO# ${joNum} — Network error`);
            document.getElementById(`joLookupStatusMsg${slotIndex}`).style.color = "#d9534f";
            document.getElementById(`joLookupStatusMsg${slotIndex}`).innerText = "❌ Network error.";
          }
        }

        // Summary popup
        let summaryHtml = "";
        if (results.success.length > 0) summaryHtml += `<strong>✅ ${results.success.length} linked:</strong><br>${results.success.join("<br>")}<br><br>`;
        if (results.failed.length  > 0) summaryHtml += `<strong>❌ ${results.failed.length} failed:</strong><br>${results.failed.join("<br>")}`;

        if (results.failed.length === 0) {
          swal({ title: "All Done!", html: summaryHtml || `All ${results.success.length} JO(s) linked to GCash Ref# ${gcashRef}.`, type: "success" });
          // Clear on full success
          this.reset();
          document.getElementById("lookupTableBody").innerHTML = "";
          document.getElementById("lookupTableWrapper").style.display = "none";
          document.getElementById("lookupStatusMsg").innerText = "";
          for (let s = 1; s <= JO_SLOT_COUNT; s++) {
            document.getElementById(`joLookupTableBody${s}`).innerHTML = "";
            document.getElementById(`joLookupTableWrapper${s}`).style.display = "none";
            document.getElementById(`joLookupStatusMsg${s}`).innerText = "";
          }
        } else {
          swal({ title: "Partial / Failed", html: summaryHtml, type: results.success.length > 0 ? "warning" : "error" });
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "Associate Reference";
      });
    </script>
  </body>
</html>

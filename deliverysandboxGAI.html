<body class="min-h-screen bg-slate-50 text-slate-900 flex flex-col selection:bg-indigo-500 selection:text-white">

  <!-- React root mount mount point -->
  <div id="root"></div>

  <script type="text/babel">
    // De-structure standard hooks
    const { useState, useEffect, useRef } = React;

    // ================================================================
    //  CONFIGURATION & ENDPOINTS (Matches App.tsx)
    // ================================================================
    const scriptURL = "https://script.google.com/macros/s/AKfycbyvt6V7CiOvjDjqcKrRpVNXgCj9AS912tgj21unL8ysnQVyiW0YELCiKE5A88Fle9K-/exec";
    const requestScriptURL = "https://script.google.com/macros/s/AKfycbzYOoeDKxGOTHq9Vd4XB-8a5y46EWrclxOcou7zpt_AfQ7xzJKk9MEtowneh4EXwLk5/exec";
    const gcashLookupScriptURL = "https://script.google.com/macros/s/AKfycbzYOoeDKxGOTHq9Vd4XB-8a5y46EWrclxOcou7zpt_AfQ7xzJKk9MEtowneh4EXwLk5/exec";

    const DELIVERY_STAFF_OPTIONS = [
      "Joshua", "Joshua2", "Lowi", "Edward", "LAVAR", "NIDA"
    ];

    // Navigation Directory Modules Links
    const SYSTEM_DIRECTORY_LINKS = [
      {
        title: "Main Lavar Laundry Worksheet",
        desc: "Interactive database containing primary wash, fold, dispatch, and financial records.",
        path: "https://docs.google.com/spreadsheets/d/1z3_E5L-H7S6K_t_E-vMcoE6_hBndf-287-M90vW9t00/edit"
      },
      {
        title: "GCash Ledger Receipts Sheet",
        desc: "Master logs matching 6-digit references, extracted transaction sums, and audits.",
        path: "https://docs.google.com/spreadsheets/d/1z3_E5L-H7S6K_t_E-vMcoE6_hBndf-287-M90vW9t00/edit#gid=1903672023"
      },
      {
        title: "Dispatch Performance Reports",
        desc: "Deliveries completed per personnel, timelines, coordinates, and pending jobs.",
        path: "https://docs.google.com/spreadsheets/d/1z3_E5L-H7S6K_t_E-vMcoE6_hBndf-287-M90vW9t00/edit#gid=149816593"
      }
    ];

    // ================================================================
    //  UTILITY COMPONENT: CDN-compatible Lucide Icons
    // ================================================================
    const LucideIcon = ({ name, size = 18, className = "" }) => {
      const ref = useRef(null);

      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          
          // Case-insensitive lookup helper for UMD Uuids
          const findIcon = (n) => {
            if (!window.lucide || !window.lucide.icons) return null;
            if (window.lucide.icons[n]) return window.lucide.icons[n];
            
            const lower = n.toLowerCase();
            const kebab = n.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
            const keys = Object.keys(window.lucide.icons);
            
            const matchKey = keys.find(k => k.toLowerCase() === lower || k.toLowerCase() === kebab);
            if (matchKey) return window.lucide.icons[matchKey];
            
            return window.lucide.icons.helpCircle || window.lucide.icons.HelpCircle;
          };

          const icon = findIcon(name);
          if (icon) {
            const svg = icon.toSvg({
              class: className,
              width: size,
              height: size,
              'stroke-width': 2,
            });
            ref.current.innerHTML = svg;
          }
        }
      }, [name, size, className]);

      return <span ref={ref} className={`inline-flex items-center justify-center shrink-0 ${className}`} />;
    };

    // Helper functions
    function getManilaDateString() {
      return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Manila' });
    }

    function getDriveThumbnail(url) {
      if (!url) return "";
      const match = url.match(/[-\w]{25,}/);
      return match ? `https://drive.google.com/thumbnail?id=${match[0]}` : "";
    }

    function compressImageToBase64(file, maxDimension = 1600, quality = 0.85) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > height && width > maxDimension) {
              height = Math.round(height * (maxDimension / width));
              width = maxDimension;
            } else if (height >= width && height > maxDimension) {
              width = Math.round(width * (maxDimension / height));
              height = maxDimension;
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            if (ctx) {
              ctx.drawImage(img, 0, 0, width, height);
              const dataUrl = canvas.toDataURL("image/jpeg", quality);
              resolve(dataUrl.split(",")[1]);
            } else {
              reject(new Error("Could not compress."));
            }
          };
          img.onerror = () => reject(new Error("Could not load image."));
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          if (reader.result) {
            resolve(reader.result.split(',')[1]);
          } else {
            reject(new Error("File empty"));
          }
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ================================================================
    //  MAIN APPLICATION COMPONENT
    // ================================================================
    function App() {
      const [activeTab, setActiveTab] = useState('form');
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [currentDate, setCurrentDate] = useState(getManilaDateString());
      const [dropdownJOs, setDropdownJOs] = useState([]);
      const [dropdownLoading, setDropdownLoading] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchLoading, setSearchLoading] = useState(false);
      const [searchResult, setSearchResult] = useState(null);
      const [searchError, setSearchError] = useState(null);

      // Form State
      const [serviceType, setServiceType] = useState('Delivery');
      const [deliveryStaff, setDeliveryStaff] = useState('');
      const [paymentType, setPaymentType] = useState('Cash');
      const [gcashRef, setGcashRef] = useState('');
      const [comments, setComments] = useState('');
      const [submitting, setSubmitting] = useState(false);

      // Media states
      const [media1, setMedia1] = useState(null);
      const [media1Preview, setMedia1Preview] = useState(null);
      const [media2, setMedia2] = useState(null);
      const [media2Preview, setMedia2Preview] = useState(null);
      const [media3, setMedia3] = useState(null);
      const [media3Preview, setMedia3Preview] = useState(null);

      // GCash Screen Parsing
      const [gcashMedia, setGcashMedia] = useState(null);
      const [gcashMediaPreview, setGcashMediaPreview] = useState(null);
      const [aiAnalyzing, setAiAnalyzing] = useState(false);
      const [aiStatusMsg, setAiStatusMsg] = useState('');
      const [scannedAmount, setScannedAmount] = useState('');
      const [scannedDate, setScannedDate] = useState('');
      const [amountMismatchFlag, setAmountMismatchFlag] = useState('');
      const [dateAnomalyFlag, setDateAnomalyFlag] = useState('');

      // Reference checking
      const [gcashRefStatus, setGcashRefStatus] = useState('idle');
      const [gcashRefUsageDetails, setGcashRefUsageDetails] = useState('');

      // Queue system
      const [uploadQueue, setUploadQueue] = useState(() => {
        const saved = localStorage.getItem('lavar_delivery_queue');
        return saved ? JSON.parse(saved) : [];
      });
      const [isUploading, setIsUploading] = useState(false);

      // Ledger check
      const [lookupRefInput, setLookupRefInput] = useState('');
      const [lookupLoading, setLookupLoading] = useState(false);
      const [lookupStatus, setLookupStatus] = useState('');
      const [lookupResults, setLookupResults] = useState([]);

      // Placeholders
      const [placeholderJOs, setPlaceholderJOs] = useState([]);
      const [placeholderLoading, setPlaceholderLoading] = useState(false);
      const [selectedPlaceholderJOs, setSelectedPlaceholderJOs] = useState([]);
      const [associating, setAssociating] = useState(false);

      // Feedbacks
      const [toasts, setToasts] = useState([]);
      const [debugLogs, setDebugLogs] = useState([]);
      const [showDebug, setShowDebug] = useState(false);
      const [fileInputKey, setFileInputKey] = useState(0);

      const currentJOAmount = useRef(null);
      const currentJOCreatedDate = useRef(null);
      const verificationTimer = useRef(null);
      const lookupTimer = useRef(null);

      const logDebug = (type, message) => {
        const time = new Date().toLocaleTimeString();
        setDebugLogs(prev => [{ time, type, message }, ...prev].slice(0, 50));
      };

      const addToast = (type, title, message) => {
        const id = Math.random().toString(36).substring(2, 9);
        setToasts(prev => [...prev, { id, type, title, message }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 5000);
      };

      // Online status sync
      useEffect(() => {
        const handleOnline = () => {
          setIsOnline(true);
          logDebug('success', 'Satellite link restored.');
          addToast('success', 'Online Mode', 'Satellite link connected. Background synchronizer active.');
        };
        const handleOffline = () => {
          setIsOnline(false);
          logDebug('warn', 'Satellite connection offline. Local buffers active.');
          addToast('warning', 'Offline Mode', 'Network disconnected. Data will buffer inside device storage.');
        };
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      // Queue state local storage sync
      useEffect(() => {
        localStorage.setItem('lavar_delivery_queue', JSON.stringify(uploadQueue));
      }, [uploadQueue]);

      // Daily job list loader
      useEffect(() => {
        const loadRequestedJOs = async () => {
          setDropdownLoading(true);
          logDebug('info', `Reading requested JO list for: ${currentDate}`);
          try {
            const response = await fetch(`${requestScriptURL}?date=${encodeURIComponent(currentDate)}`);
            const data = await response.json();
            if (Array.isArray(data)) {
              const formatted = data
                .filter(item => item["Del JO#"])
                .map(item => ({
                  jor: String(item["Del JO#"]).trim(),
                  name: String(item["name"] || '').trim()
                }));
              setDropdownJOs(formatted);
              logDebug('success', `Located ${formatted.length} pending JOs on date ${currentDate}.`);
            } else {
              setDropdownJOs([]);
              logDebug('warn', `No logs fetched for date ${currentDate}.`);
            }
          } catch (err) {
            setDropdownJOs([]);
            logDebug('error', `Failed reading daily JO list: ${err.message || err}`);
          } finally {
            setDropdownLoading(false);
          }
        };
        loadRequestedJOs();
      }, [currentDate]);

      // Dynamic Sync Dispatch Thread (every 5 seconds)
      useEffect(() => {
        let active = true;
        const syncQueue = async () => {
          if (isUploading || uploadQueue.length === 0 || !navigator.onLine || !active) return;
          setIsUploading(true);
          const current = uploadQueue[0];
          logDebug('info', `Background Synced: Transmitting JO# ${current.JOR} for ${current.CustomerName}...`);

          try {
            const params = new URLSearchParams();
            Object.entries(current).forEach(([key, value]) => {
              if (value !== undefined && value !== null) {
                params.append(key, String(value));
              }
            });

            await fetch(scriptURL, {
              method: "POST",
              mode: "no-cors",
              body: params.toString(),
              headers: { "Content-Type": "application/x-www-form-urlencoded" }
            });

            logDebug('success', `Success: Logged JO# ${current.JOR} directly on spreadsheet ledger.`);
            addToast('success', 'Synchronized', `JO# ${current.JOR} uploaded successfully!`);
            
            if (active) {
              setUploadQueue(prev => prev.slice(1));
            }
          } catch (err) {
            logDebug('error', `Buffer sync failed: ${err.message || err}`);
          } finally {
            if (active) {
              setIsUploading(false);
            }
          }
        };

        const interval = setInterval(syncQueue, 5000);
        return () => {
          active = false;
          clearInterval(interval);
        };
      }, [uploadQueue, isUploading, isOnline]);

      // Reference uniqueness validation
      useEffect(() => {
        if (paymentType !== 'G-Cash') return;
        if (verificationTimer.current) clearTimeout(verificationTimer.current);

        const ref = gcashRef.trim();
        if (!ref) {
          setGcashRefStatus('idle');
          setGcashRefUsageDetails('');
          return;
        }

        if (ref === "000000") {
          setGcashRefStatus('available');
          setGcashRefUsageDetails('Placeholder reference number allowed.');
          return;
        }

        const alphanumericPattern = /^[A-Za-z0-9]{4,20}$/;
        if (!alphanumericPattern.test(ref)) {
          setGcashRefStatus('idle');
          return;
        }

        setGcashRefStatus('validating');
        verificationTimer.current = setTimeout(async () => {
          try {
            logDebug('info', `Scanning database for GCash Ref duplicate: ${ref}`);
            const response = await fetch(`${gcashLookupScriptURL}?action=lookupGcashDetails&gcashRef=${encodeURIComponent(ref)}`);
            const result = await response.json();
            
            if (result.result === "success") {
              const match = result.data[0];
              setGcashRefStatus('used');
              setGcashRefUsageDetails(`Used by JO# ${match.jor} | ${match.customerName}. Submissions restricted except for "000000".`);
              logDebug('warn', `Double spend alert: Ref ${ref} is already allocated to JO# ${match.jor}.`);
            } else {
              setGcashRefStatus('available');
              setGcashRefUsageDetails('Reference number is unique & valid.');
              logDebug('success', `Reference ${ref} verified as unique.`);
            }
          } catch (err) {
            setGcashRefStatus('error');
            setGcashRefUsageDetails('Dup check offline. Verify manually.');
            logDebug('error', `Dup check error: ${err.message || err}`);
          }
        }, 800);

        return () => {
          if (verificationTimer.current) clearTimeout(verificationTimer.current);
        };
      }, [gcashRef, paymentType]);

      // Ledger search module check
      useEffect(() => {
        if (activeTab !== 'lookup') return;
        if (lookupTimer.current) clearTimeout(lookupTimer.current);

        const ref = lookupRefInput.trim();
        if (ref.length === 0) {
          setLookupResults([]);
          setLookupStatus('');
          return;
        }

        if (!/^\d{6}$/.test(ref)) {
          setLookupStatus('Reference must be exactly 6 digits.');
          setLookupResults([]);
          return;
        }

        setLookupLoading(true);
        setLookupStatus('Searching...');

        lookupTimer.current = setTimeout(async () => {
          try {
            logDebug('info', `Searching ledger for Ref: ${ref}`);
            const response = await fetch(`${gcashLookupScriptURL}?action=lookupGcashDetails&gcashRef=${encodeURIComponent(ref)}`);
            const data = await response.json();

            if (data.result === "success") {
              setLookupResults(data.data || []);
              setLookupStatus(`Found ${data.data.length} matched log(s).`);
              logDebug('success', `Located match for reference ${ref}.`);

              if (data.data.length > 0 && data.data[0].customerName) {
                fetchCustomerPlaceholders(data.data[0].customerName);
              }
            } else {
              setLookupResults([]);
              setLookupStatus('No records found for this reference.');
              logDebug('warn', `No spreadsheet ledger record found for reference: ${ref}`);
              setPlaceholderJOs([]);
            }
          } catch (err) {
            setLookupStatus('Network fetch error.');
            logDebug('error', `Ledger scan failed: ${err.message || err}`);
          } finally {
            setLookupLoading(false);
          }
        }, 600);

        return () => {
          if (lookupTimer.current) clearTimeout(lookupTimer.current);
        };
      }, [lookupRefInput, activeTab]);

      const checkAmountAnomaly = (parsedAmt) => {
        const amt = parseFloat(parsedAmt);
        const targetAmt = currentJOAmount.current;

        if (!targetAmt || isNaN(amt)) {
          setAmountMismatchFlag('');
          return;
        }

        const difference = Math.abs(amt - targetAmt);
        if (difference > 0.01) {
          const isUnderpaid = amt < targetAmt;
          const label = isUnderpaid ? "UNDERPAID" : "OVERPAID";
          setAmountMismatchFlag(`${label}: Receipt shows ₱${amt.toFixed(2)} vs JO Total ₱${targetAmt.toFixed(2)} (Diff: ₱${difference.toFixed(2)})`);
        } else {
          setAmountMismatchFlag('');
        }
      };

      const checkDateAnomaly = (parsedDateStr) => {
        const targetCreatedDate = currentJOCreatedDate.current;
        if (!targetCreatedDate || !parsedDateStr) {
          setDateAnomalyFlag('');
          return;
        }

        const receiptDate = new Date(parsedDateStr.replace(" ", "T"));
        if (isNaN(receiptDate.getTime())) {
          setDateAnomalyFlag('');
          return;
        }

        const isBeforeJO = receiptDate.getTime() < targetCreatedDate.getTime();
        if (isBeforeJO) {
          setDateAnomalyFlag(`BACKDATED_RECEIPT: Scanned date ${parsedDateStr} is earlier than JO creation time ${targetCreatedDate.toLocaleString()}`);
        } else {
          setDateAnomalyFlag('');
        }
      };

      const handleDayOffset = (days) => {
        const activeDate = new Date(currentDate);
        activeDate.setDate(activeDate.getDate() + days);
        setCurrentDate(activeDate.toISOString().split("T")[0]);
      };

      const handleDropdownSelection = (e) => {
        const val = e.target.value;
        if (val) {
          setSearchQuery(val);
          handleSearchJO(val);
        }
      };

      const handleSearchJO = async (targetJO) => {
        const joNum = targetJO.trim();
        if (!joNum) {
          addToast('error', 'Search Error', 'Please specify a valid Job Order ID.');
          return;
        }

        setSearchLoading(true);
        setSearchError(null);
        setSearchResult(null);
        logDebug('info', `Querying spreadsheet ledger for JO ID: ${joNum}`);

        try {
          const response = await fetch(`${scriptURL}?JO=${encodeURIComponent(joNum)}`);
          const data = await response.json();

          if (data.result === "not found") {
            setSearchError("Di Pa Na Log ng mga Nagtupi. Tawagan sila at ipalog.");
            logDebug('warn', `Job Order ${joNum} is currently not found on spreadsheet.`);
            addToast('warning', 'Awaiting Entry', 'Folding staff has not logged this JO.');
          } else {
            setSearchResult(data);
            
            if (data.DeliveryStaff && data.DeliveryStaff.trim()) {
              setDeliveryStaff(data.DeliveryStaff);
              setComments(data.Comments || '');
              logDebug('info', `JO# ${joNum} has existing logs. Entering UPDATE mode.`);
            } else {
              setDeliveryStaff('');
              setComments('');
            }

            currentJOAmount.current = parseFloat(String(data.colK).replace(/[^0-9.]/g, "")) || null;
            const rawCreatedDate = data.JOCreatedDate ? data.JOCreatedDate.replace(" ", "T") : null;
            if (rawCreatedDate) {
              const parsed = new Date(rawCreatedDate);
              currentJOCreatedDate.current = isNaN(parsed.getTime()) ? null : parsed;
            } else {
              currentJOCreatedDate.current = null;
            }

            logDebug('success', `Found client record: ${data.value} for JO ID ${joNum}.`);
            
            if (data.value) {
              fetchCustomerPlaceholders(data.value);
            }
          }
        } catch (err) {
          setSearchError("Server connection timed out. Verify your internet connection.");
          logDebug('error', `Failed search request: ${err.message || err}`);
        } finally {
          setSearchLoading(false);
        }
      };

      const fetchCustomerPlaceholders = async (name) => {
        setPlaceholderLoading(true);
        logDebug('info', `Searching outstanding placeholders for: "${name}"`);
        try {
          const response = await fetch(`${gcashLookupScriptURL}?action=lookupGcashDetails&gcashRef=000000`);
          const result = await response.json();
          if (result.result === "success") {
            const matches = (result.data || []).filter(item => 
              item.customerName && item.customerName.trim().toLowerCase() === name.trim().toLowerCase()
            );
            setPlaceholderJOs(matches);
            logDebug('success', `Located ${matches.length} placeholder logs.`);
          } else {
            setPlaceholderJOs([]);
          }
        } catch (err) {
          logDebug('error', `Sweep failed: ${err.message || err}`);
        } finally {
          setPlaceholderLoading(false);
        }
      };

      // Gemini OCR Apps Script endpoint bridge
      const handleGcashMediaUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        setGcashMedia(file);
        const objectUrl = URL.createObjectURL(file);
        setGcashMediaPreview(objectUrl);

        setAiAnalyzing(true);
        setAiStatusMsg("Gemini AI is parsing and verifying screenshot...");
        logDebug('info', `Uploading file "${file.name}" to Gemini OCR scanner...`);

        try {
          const base64Data = await compressImageToBase64(file);
          
          const payload = new URLSearchParams();
          payload.append("action", "analyzeGcash");
          payload.append("base64Data", base64Data);
          payload.append("mimeType", "image/jpeg");

          const response = await fetch(scriptURL, {
            method: "POST",
            body: payload,
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
          });
          
          const parsed = await response.json();

          if (parsed && parsed.shortRefNo) {
            const ref = parsed.shortRefNo;
            setGcashRef(ref);
            setScannedAmount(parsed.amount || '');
            setScannedDate(parsed.transactionDate || '');

            if (ref !== "000000") {
              checkAmountAnomaly(parsed.amount);
              checkDateAnomaly(parsed.transactionDate);
            } else {
              setAmountMismatchFlag('');
              setDateAnomalyFlag('');
            }

            setAiStatusMsg(`AI Decoded: Ref #${ref} | ₱${parsed.amount || '0'} | ${parsed.transactionDate || 'no date'}`);
            logDebug('success', `Gemini parsed successfully. Ref ${ref} | Amount: ${parsed.amount}`);
            addToast('success', 'Gemini Decoded', `Receipt read successfully! Ref: ${ref}`);
          } else {
            const noRefPlaceholder = "NOREF-" + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substring(2, 6).toUpperCase();
            setGcashRef(noRefPlaceholder);
            setScannedAmount(parsed?.amount || '');
            setScannedDate(parsed?.transactionDate || '');
            setAmountMismatchFlag('');
            setDateAnomalyFlag('');
            
            setAiStatusMsg("Reference number unreadable. Created unique verification ID.");
            logDebug('warn', 'Gemini could not parse standard reference. Created fallback verification ID.');
            addToast('warning', 'Reference Not Found', 'Assigned unique fallback ID.');
          }
        } catch (err) {
          logDebug('error', `OCR model failed: ${err.message || err}`);
          setAiStatusMsg("OCR timeout. Enter reference manually.");
          addToast('error', 'OCR Failed', 'Please input details manually.');
        } finally {
          setAiAnalyzing(false);
        }

          return;

        if (paymentType === 'G-Cash' && gcashRefStatus === 'used') {
          addToast('error', 'Duplicate Blocked', 'GCash reference number has already been allocated.');
          return;
        }

        setSubmitting(true);
        logDebug('info', `Queuing dispatch details for JO# ${searchResult.JO}...`);

        try {
          const jobPayload = {
            JOR: searchResult.JO,
            CustomerName: searchResult.value,
            serviceType,
            DeliveryStaff: deliveryStaff,
            PaymentType: paymentType,
            gcashInfo: paymentType === 'G-Cash' ? gcashRef : '',
            GcashTransAmount: paymentType === 'G-Cash' ? scannedAmount : '',
            TransactionDate: paymentType === 'G-Cash' ? scannedDate : '',
            AmountMismatchFlag: paymentType === 'G-Cash' ? amountMismatchFlag : '',
            DateAnomalyFlag: paymentType === 'G-Cash' ? dateAnomalyFlag : '',

            UniqueID: searchResult.UniqueID || ''

          const fileTasks = [];
          if (paymentType === 'G-Cash' && gcashMedia) {
            fileTasks.push(readFileAsBase64(gcashMedia).then(b64 => ({ key: 'media', val: b64 })));
          } else if (media1) {
            fileTasks.push(readFileAsBase64(media1).then(b64 => ({ key: 'media', val: b64 })));
          }

          if (media2) {
            fileTasks.push(readFileAsBase64(media2).then(b64 => ({ key: 'media2', val: b64 })));
          }
          if (media3) {
            fileTasks.push(readFileAsBase64(media3).then(b64 => ({ key: 'media3', val: b64 })));
          }

          const encodedFiles = await Promise.all(fileTasks);
          encodedFiles.forEach(item => {
            jobPayload[item.key] = item.val;
          });

          // Filter from selector
          setDropdownJOs(prev => prev.filter(item => item.jor !== searchResult.JO));

          // Enqueue
          setUploadQueue(prev => [...prev, jobPayload]);
          logDebug('success', `Added dispatch logs to local device queue.`);
          addToast('success', 'Dispatched Locally', `JO# ${searchResult.JO} is added to sync queue.`);

          handleClearForm();
        } catch (err) {
          logDebug('error', `Encoding files failed: ${err.message || err}`);
          addToast('error', 'Process Failure', 'Failed to compress or read logs attachment.');
        } finally {
          setSubmitting(false);
        }
      };

      const handleBulkAssociate = async () => {
        if (selectedPlaceholderJOs.length === 0) {
          addToast('warning', 'Selection Empty', 'Select at least one placeholder Job Order.');
          return;
        }

        const ref = lookupRefInput.trim();
        if (!ref || !/^\d{6}$/.test(ref)) {
          addToast('warning', 'Ref Invalid', 'Verify standard 6-digit reference format.');
          return;
        }

        setAssociating(true);
        logDebug('info', `Linking ${selectedPlaceholderJOs.length} placeholder(s) to Ref: ${ref}`);

        let successes = 0;
        let failures = 0;

        for (const jo of selectedPlaceholderJOs) {

            const url = `${gcashLookupScriptURL}?action=associateGcash&lookupGcashRef=${encodeURIComponent(ref)}&lookupJoNum=${encodeURIComponent(jo)}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.result === "success") {
              successes++;
              logDebug('success', `Linked JO# ${jo} -> Reference ${ref} successfully.`);
            } else {
              failures++;
              logDebug('error', `Failed linking JO# ${jo}: ${data.message || 'Unknown response'}`);
            }
          } catch (err) {
            failures++;
            logDebug('error', `Link exception on JO# ${jo}: ${err.message || err}`);

                              <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                <table className="w-full text-left text-xs">
                                  <thead className="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase border-b border-slate-200">
                                    <tr>
                                      <th className="p-3 w-12 text-center">Select</th>
                                      <th className="p-3">JO Ref #</th>
                                      <th className="p-3">Timestamp</th>
                                      <th className="p-3">Customer</th>
                                      <th className="p-3 text-right">Amount</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100 font-mono text-slate-700">
                                    {placeholderJOs.map((item, idx) => (
                                      <tr key={idx} className="hover:bg-slate-50/50">
                                        <td className="p-3 text-center">
                                          <input
                                            type="checkbox"
                                            checked={selectedPlaceholderJOs.includes(item.jor)}
                                            onChange={(e) => {
                                              if (e.target.checked) {
                                                setSelectedPlaceholderJOs(prev => [...prev, item.jor]);
                                              } else {
                                                setSelectedPlaceholderJOs(prev => prev.filter(id => id !== item.jor));
                                              }
                                            }}
                                            className="w-4.5 h-4.5 accent-indigo-600 rounded border-slate-300 bg-white cursor-pointer"
                                          />
                                        </td>
                                        <td className="p-3 text-indigo-600 font-bold">{item.jor}</td>
                                        <td className="p-3 text-slate-500">{item.timestamp}</td>
                                        <td className="p-3 text-slate-900 font-sans font-semibold">{item.customerName}</td>
                                        <td className="p-3 text-right text-slate-900 font-bold">₱{item.gcashTransAmount || '—'}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}
                        </div>
                      ) : (
                        <div className="text-center py-12 text-slate-400 text-xs md:text-sm">
                          <LucideIcon name="Info" size={48} className="text-slate-200 mx-auto mb-3" />
                          <span>Search for a client JO on the Delivery Form to check their pending placeholders.</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* ================================================================
                    TAB 4: SYSTEM HUB LINKS
                   ================================================================ */}
                {activeTab === 'system' && (
                  <div className="max-w-4xl mx-auto space-y-6">
                    <div className="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-sm">
                      <h2 className="text-xl font-bold tracking-tight text-slate-900 mb-2 flex items-center gap-2">
                        <LucideIcon name="ExternalLink" size={24} className="text-indigo-600" />
                        <span>Lavar Laundry Logistics Directory</span>
                      </h2>
                      <p className="text-xs text-slate-500 mb-6 font-medium">
                        Quickly launch related modules of the Lavar Laundry sheets interface. Click to open in external sheets:
                      </p>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {SYSTEM_DIRECTORY_LINKS.map((item, index) => (
                          <a
                            key={index}
                            href={item.path}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="bg-white border border-slate-200 hover:border-indigo-500/40 p-5 rounded-2xl transition flex justify-between items-center group shadow-sm hover:shadow"
                          >
                            <div>
                              <h3 className="font-extrabold text-slate-800 group-hover:text-indigo-600 transition text-sm">
                                {item.title}
                              </h3>
                              <p className="text-xs text-slate-500 mt-1">{item.desc}</p>
                            </div>
                            <LucideIcon name="ExternalLink" size={20} className="text-slate-400 group-hover:text-indigo-600 transition" />
                          </a>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* ================================================================
              TELEMETRY LOG STREAM (Collapsible panel)
             ================================================================ */}
          {showDebug && (
            <div className="border-t border-slate-200 bg-white font-mono text-[10px] md:text-xs overflow-hidden relative z-50 shadow-inner">
              <div className="max-w-7xl mx-auto p-4 space-y-2">
                <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                  <span className="text-indigo-600 font-bold flex items-center gap-2">
                    <LucideIcon name="Terminal" size={16} />
                    <span>LAVAR LOGGER TELEMETRY STREAM</span>
                  </span>
                  <button 
                    onClick={() => setShowDebug(false)}
                    className="text-slate-400 hover:text-slate-600 text-[10px] font-bold cursor-pointer"
                  >
                    CLOSE [X]
                  </button>
                </div>

                <div className="max-h-48 overflow-y-auto space-y-1.5 scrollbar-thin">
                  {debugLogs.length === 0 ? (
                    <p className="text-slate-400 italic">No operations recorded yet.</p>
                  ) : (
                    debugLogs.map((log, index) => (
                      <div key={index} className="flex gap-2">
                        <span className="text-slate-400 shrink-0">[{log.time}]</span>
                        <span className={`shrink-0 font-bold ${
                          log.type === 'success' ? 'text-emerald-600' : 
                          log.type === 'error' ? 'text-rose-600' : 
                          log.type === 'warn' ? 'text-amber-600' : 'text-indigo-600'
                        }`}>
                          {log.type.toUpperCase()}:
                        </span>
                        <span className="text-slate-700 break-all">{log.message}</span>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ================================================================
              NOTIFICATIONS & TOASTS SYSTEM
             ================================================================ */}
          <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none">
            {toasts.map(t => (
              <div
                key={t.id}
                className="p-4 rounded-xl border shadow-xl flex gap-3 pointer-events-auto bg-white border-slate-200 animate-fade-in"
              >
                <div className={`p-2 rounded-lg shrink-0 border ${
                  t.type === 'success' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' :
                  t.type === 'error' ? 'bg-rose-50 text-rose-600 border-rose-100' :
                  t.type === 'warning' ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-indigo-50 text-indigo-600 border-indigo-100'
                }`}>
                  <LucideIcon name={
                    t.type === 'success' ? 'CheckCircle' :
                    t.type === 'error' ? 'AlertTriangle' :
                    t.type === 'warning' ? 'AlertTriangle' : 'Info'
                  } size={20} />
                </div>
                <div>
                  <h4 className="font-bold text-xs md:text-sm text-slate-950">{t.title}</h4>
                  <p className="text-[11px] md:text-xs text-slate-500 mt-0.5">{t.message}</p>
                </div>
              </div>
            ))}
          </div>

          {/* ================================================================
              FOOTER SYSTEM CREDIT
             ================================================================ */}
          <footer className="bg-white border-t border-slate-200 py-6 px-6 text-center text-[11px] text-slate-400 font-medium">
            <div>Lavar Laundry Logistics Applet. Built as a fully standalone, self-contained interactive suite.</div>
          </footer>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
